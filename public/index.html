<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Package Tracker</title>
  <style>
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #f4f5f7;
      margin: 0;
      padding: 0;
      color: #111827;
    }
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin-top: 0;
      font-size: 2rem;
    }
    p {
      margin-top: 0;
      color: #4b5563;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(15, 23, 42, 0.05);
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 16px;
      font-weight: 600;
    }
    input,
    select,
    textarea,
    button {
      width: 100%;
      font: inherit;
      margin-top: 8px;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
    }
    textarea {
      resize: vertical;
      min-height: 96px;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 18px;
    }
    button:hover {
      background: #1d4ed8;
    }
    .response {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #d1d5db;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .track-result {
      margin-top: 14px;
      padding: 18px;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      box-shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
    }
    .track-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .track-header strong {
      font-size: 1rem;
      color: #111827;
    }
    .status-pill {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.92rem;
      color: white;
      background: #2563eb;
    }
    .package-description {
      margin: 0 0 12px;
      color: #4b5563;
      line-height: 1.6;
    }
    .history-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }
    .history-item {
      padding: 14px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #f8fafc;
    }
    .history-item strong {
      display: block;
      margin-bottom: 6px;
      color: #111827;
    }
    .track-result img {
      max-width: 100%;
      border-radius: 14px;
      margin-bottom: 14px;
    }
    .error {
      border-color: #fca5a5;
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Package Tracking Website</h1>
    <p>Use this page to create a package, update its status, or check tracking history.</p>

    <section class="card">
      <h2>Create Package</h2>
      <form id="create-form">
        <label for="create-description">Description</label>
        <textarea id="create-description" placeholder="Enter a description (optional)"></textarea>
        <button type="submit">Create Package</button>
      </form>
      <div id="create-response" class="response" hidden></div>
    </section>

    <section class="card">
      <h2>Track Package</h2>
      <form id="track-form">
        <label for="track-id">Tracking ID</label>
        <input id="track-id" placeholder="PKG-XXXXXXX" required />
        <button type="submit">Track</button>
      </form>
      <p style="margin-top: 12px; color: #6b7280;">You can also share a direct tracking link like <code>/view/PKG-XXXXXXX</code> or <code>/?trackingId=PKG-XXXXXXX</code>.</p>
      <div id="track-response" class="response" hidden></div>
    </section>

    <section class="card">
      <h2>Update Package</h2>
      <form id="update-form">
        <label for="update-id">Tracking ID</label>
        <input id="update-id" placeholder="PKG-XXXXXXX" required />
        <label for="update-location">Location</label>
        <input id="update-location" placeholder="Current location" required />
        <label for="update-status">Status</label>
        <select id="update-status" required>
          <option value="In Transit">In Transit</option>
          <option value="Out for Delivery">Out for Delivery</option>
          <option value="Delivered">Delivered</option>
          <option value="Delayed">Delayed</option>
          <option value="Returned">Returned</option>
        </select>
        <button type="submit">Update Package</button>
      </form>
      <div id="update-response" class="response" hidden></div>
    </section>
  </div>

  <script>
    const showResponse = (element, data, isError = false) => {
      element.hidden = false;
      element.textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2);
      element.classList.toggle("error", isError);
    };

    const renderTrackResult = (element, data) => {
      element.hidden = false;
      element.classList.remove("error");
      const historyHtml = data.history
        .map(
          (item) => `
            <li class="history-item">
              <strong>${item.status}</strong>
              <div><strong>Location:</strong> ${item.location}</div>
              <div><strong>Date:</strong> ${new Date(item.date).toLocaleString()}</div>
            </li>`
        )
        .join("");

      element.innerHTML = `
        <div class="track-result">
          <div class="track-header">
            <strong>Tracking ID: ${data.trackingId}</strong>
            <span class="status-pill">${data.status}</span>
          </div>
          <p class="package-description">${data.description}</p>
          <img src="https://via.placeholder.com/860x220?text=Package+Tracking" alt="Tracking illustration" />
          <h3>History</h3>
          <ul class="history-list">${historyHtml}</ul>
        </div>
      `;
    };

    const handleSubmit = async (form, url, body, responseElement) => {
      try {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          showResponse(responseElement, data.error || JSON.stringify(data, null, 2), true);
          return;
        }
        showResponse(responseElement, data);
      } catch (error) {
        showResponse(responseElement, error.message, true);
      }
    };

    document.getElementById("create-form").addEventListener("submit", (event) => {
      event.preventDefault();
      const description = document.getElementById("create-description").value.trim();
      handleSubmit(
        event.target,
        "/api/create",
        { description },
        document.getElementById("create-response")
      );
    });

    const trackPackage = async (trackingId) => {
      const responseElement = document.getElementById("track-response");
      if (!trackingId) {
        showResponse(responseElement, "Tracking ID is required.", true);
        return;
      }

      try {
        const res = await fetch(`/api/track/${encodeURIComponent(trackingId)}`);
        const data = await res.json();
        if (!res.ok) {
          showResponse(responseElement, data.error || JSON.stringify(data, null, 2), true);
          return;
        }
        renderTrackResult(responseElement, data);
      } catch (error) {
        showResponse(responseElement, error.message, true);
      }
    };

    document.getElementById("track-form").addEventListener("submit", (event) => {
      event.preventDefault();
      const trackingId = document.getElementById("track-id").value.trim();
      trackPackage(trackingId);
    });

    document.getElementById("update-form").addEventListener("submit", (event) => {
      event.preventDefault();
      const trackingId = document.getElementById("update-id").value.trim();
      const location = document.getElementById("update-location").value.trim();
      const status = document.getElementById("update-status").value;
      const responseElement = document.getElementById("update-response");

      if (!trackingId || !location || !status) {
        showResponse(responseElement, "All fields are required.", true);
        return;
      }

      handleSubmit(
        event.target,
        "/api/update",
        { trackingId, location, status },
        responseElement
      );
    });

    const searchParams = new URLSearchParams(window.location.search);
    const byQuery = searchParams.get("trackingId") || searchParams.get("trackingid") || searchParams.get("trackingID") || searchParams.get("id");
    const pathMatch = window.location.pathname.match(/^\/view\/(PKG-[A-Z0-9]+)$/i);
    const initialTrackingId = byQuery || (pathMatch ? pathMatch[1] : null);

    if (initialTrackingId) {
      const createSection = document.querySelector(".page > section:first-of-type");
      const updateSection = document.querySelector(".page > section:last-of-type");
      const trackInput = document.getElementById("track-id");
      const trackSection = document.querySelector(".page > section:nth-of-type(2)");

      if (createSection) createSection.style.display = "none";
      if (updateSection) updateSection.style.display = "none";
      if (trackSection) trackSection.scrollIntoView({ behavior: "smooth" });

      trackInput.value = initialTrackingId;
      trackPackage(initialTrackingId);
    }
  </script>
</body>
</html>
